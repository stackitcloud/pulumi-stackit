name: release
on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.PR_TOKEN }}
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  PROVIDER: stackit
  PULUMI_GO_DEP_ROOT: ${{ github.workspace }}/..
  PUBLISH_NPM: true
  #NUGET_PUBLISH_KEY: ${{ secrets.NUGET_PUBLISH_KEY }}
  #NUGET_FEED_URL: https://api.nuget.org/v3/index.json
  #PULUMI_LOCAL_NUGET: ${{ github.workspace }}/nuget
  #PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
  #PYPI_USERNAME: "__token__"
  #PUBLISH_PYPI: true
  #PUBLISH_NUGET: true
jobs:
  publish_binary:
    name: Publish provider
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v4.2.2
      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags
      - name: Install pulumictl
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # tag=v3.0.0
        with:
          repo: pulumi/pulumictl
      - name: Install Go Tools
        uses: ./.github/actions/gotools
        with:
          go-version: ${{ matrix.goversion }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # tag=v6.3.0
        with:
          args: -p 3 release --clean
          version: '~> v2'
    strategy:
      fail-fast: true
      matrix:
        goversion:
          - 1.25.x
  publish_sdk:
    name: Publish SDKs to npm Registry, NuGet Gallery and Python Package Index
    runs-on: ubuntu-latest
    needs: publish_binary
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v4.2.2
      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags
      - name: Install Go Tools
        uses: ./.github/actions/gotools
        with:
          go-version: ${{ matrix.goversion }}
      - name: Install Pulumi Tools
        uses: ./.github/actions/pulumitools
        with:
          dotnet-version: ${{matrix.dotnetverson}}
          node-version: ${{matrix.nodeversion}}
          python-version: ${{matrix.pythonversion}}
      - name: Build SDK
        run: make build_${{ matrix.language }}
      - name: Check worktree clean
        run: |
          git update-index -q --refresh
          if ! git diff-files --quiet; then
              >&2 echo "error: working tree is not clean, aborting!"
              git status
              git diff
              exit 1
          fi
      - if: ${{ matrix.language == 'nodejs' }}
        name: Run type script unit tests
        run: make test_ts
      - if: ${{ matrix.language == 'python' && env.PUBLISH_PYPI == 'true' }}
        name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # tag=v1.14.0
        with:
          user: ${{ env.PYPI_USERNAME }}
          password: ${{ env.PYPI_PASSWORD }}
          packages_dir: ${{github.workspace}}/sdk/python/bin/dist
      - if: ${{ matrix.language == 'nodejs' && env.PUBLISH_NPM == 'true' }}
        run: |
          npm publish ${{github.workspace}}/sdk/nodejs/bin --access public
      - if: ${{ matrix.language == 'dotnet' && env.PUBLISH_NUGET == 'true' }}
        name: publish nuget package
        run: |
          dotnet nuget push ${{github.workspace}}/sdk/dotnet/bin/Debug/*.nupkg -s ${{ env.NUGET_FEED_URL }} -k ${{ env.NUGET_PUBLISH_KEY }}
          echo "done publishing packages"
    strategy:
      fail-fast: true
      matrix:
        dotnetversion:
          - 9.0.x
        goversion:
          - 1.25.x
        language:
          - nodejs
          - python
          - dotnet
          - go
        nodeversion:
          - 25.2.1
        pythonversion:
          - "3.9"
